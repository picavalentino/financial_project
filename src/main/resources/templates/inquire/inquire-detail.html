<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org" xmlns:layout="www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}">
<!--security 적용 후 아래 코드로 변경해주세요-->
<!--<html xmlns:th="www.thymeleaf.org" xmlns:layout="www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}" xmlns:sec="www.thymeleaf.org/extras/spring-security">-->

<meta charset="UTF-8">
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/inquire/common.css">
  <link rel="stylesheet" href="/css/inquire/inquire-insert.css">
  <link rel="stylesheet" href="/css/buttons/button.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<title>GS Bank</title>
<!-- 전체 적용될 CSS -->
<th:block layout:fragment="css"></th:block>
<!-- 전체 적용될 스크립트 -->
<th:block layout:fragment="script"></th:block>

<!-- 우리가 작업할 공간 -->
<body>
<div layout:fragment="content" class="content">
  <!--  위치  -->
  <div class="location">
    <a th:href="@{/main}"><i class="bi bi-house-door-fill"></i> Home</a>
    <a th:href="@{/inquire/list}"> / 게시판</a>
    <a> / 게시글 상세보기 </a>
  </div>
  <h1 class="title">게시글 상세보기</h1>
  <!--  게시글 상세 폼  -->
  <div class="form-container">
    <form class="inquire-form" th:action="@{/inquire/insert}" method="get" enctype="multipart/form-data">
      <table class="inquire-table">
        <tbody>
        <tr class="tr-row">
          <th>카테고리</th>
          <td><input type="text" readonly></td>
          <th>제목</th>
          <td colspan="3"><input type="text" readonly></td>
        </tr>
        <tr class="tr-row">
          <th>답변상태</th>
          <td><input type="text" readonly></td>
          <th>작성자</th>
          <td><input type="text" readonly></td>
          <th>등록일</th>
          <td><input type="text" readonly></td>
        </tr>
        <tr>
          <th>내용</th>
          <td colspan="5"><textarea name="inqContent" readonly></textarea></td>
        </tr>
        <tr>
          <th>첨부파일</th>
          <td colspan="5"></td>
        </tr>
        <tr>
          <th>비밀번호</th>
          <td><input type="text"></td>
        </tr>
        </tbody>
      </table>
    </form>
    <!-- 댓글 목록 -->
    <div class="comments-container">
      <table class="comment-table">
        <tr class="comment-title">
          <th class="comment-title" colspan="2">n개의 댓글</th>
          <td class="comment-title"></td>
        </tr>
        <tr>
          <th>익명</th>
          <td>
            <div class="comment-list">
              <input value="댓글 내용1" class="comment-content" type="text" readonly>
              <input value="2024-11-15 11:28" class="comment-time" type="text" readonly>
            </div>
          </td>
        </tr>
        <tr>
          <th>관리자</th>
          <td>
            <div class="comment-list">
              <input value="댓글 내용2" class="comment-content" type="text" readonly>
              <input value="2024-11-15 11:38" class="comment-time" type="text" readonly>
            </div>
          </td>
        </tr>
      </table>

      <!-- 댓글 입력 폼 -->
      <form class="comment-form" th:action="@{/inquire/comment}" method="post">
        <div>댓글</div>
        <textarea name="commentContent" rows="1" placeholder="댓글을 입력하세요" required></textarea>
        <label>익명 <input type="checkbox"></label>
        <button type="submit" class="btn-comment">입력</button>
      </form>
    </div>
  </div>
  <div class="button-wrap">
    <button class="btn" id="btn-register">
      <div class="icon-container"><i class="icon bi bi-plus-circle-fill"></i></div> 수정
    </button>
    <button class="btn" id="btn-delete">
      <div class="icon-container"><i class="bi bi-trash-fill"></i></div> 삭제
    </button>
    <button class="btn" id="btn-list">
      <div class="icon-container"><i class="icon bi bi-list"></i></div> 목록
    </button>
  </div>
  <script th:inline="javascript">

  </script>
</div>
</body>
</html>
