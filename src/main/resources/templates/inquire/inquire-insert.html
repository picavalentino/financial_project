<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org" xmlns:layout="www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}">
<!--security 적용 후 아래 코드로 변경해주세요-->
<!--<html xmlns:th="www.thymeleaf.org" xmlns:layout="www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}" xmlns:sec="www.thymeleaf.org/extras/spring-security">-->

<meta charset="UTF-8">
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/inquire/common.css">
  <link rel="stylesheet" href="/css/inquire/inquire-insert.css">
  <link rel="stylesheet" href="/css/buttons/button.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<title>GS Bank</title>
<!-- 전체 적용될 CSS -->
<th:block layout:fragment="css"></th:block>
<!-- 전체 적용될 스크립트 -->
<th:block layout:fragment="script"></th:block>

<!-- 우리가 작업할 공간 -->
<body>
<div layout:fragment="content" class="content">
  <div class="sub_content">
    <!--  위치  -->
    <div class="location">
      <a th:href="@{/main}"><i class="bi bi-house-door-fill"></i> Home</a>
      <a th:href="@{/inquire/list}"> / 게시판</a>
      <p> / 신규 게시글 등록 </p>
    </div>
    <h1 class="title">신규 게시글 등록</h1>
    <!--  게시글 등록 폼  -->
    <form class="inquire-form" th:action="@{/inquire/insert}" method="post" enctype="multipart/form-data">
      <table class="inquire-table">
        <tbody>
        <tr class="tr-row">
          <th>카테고리</th>
          <td>
            <select name="inqCategory">
              <option value="">시스템관련문의/기타건의사항</option>
              <option value="2">시스템관련문의</option>
              <option value="3">기타건의사항</option>
            </select>
          </td>
          <th>작성자</th>
          <td>
            <div class="list-row">
              <input type="text" name="writer">
              <span>익명</span>
              <input type="checkbox" name="inqAnonym">
            </div>
          </td>
        </tr>
        <tr>
          <th>제목</th>
          <td colspan="3"><input type="text" name="inqTitle"></td>
        </tr>
        <tr>
          <th>내용</th>
          <td colspan="3">
            <textarea name="inqContent" placeholder="내용을 입력하세요"></textarea>
          </td>
        </tr>
        <tr>
          <th>첨부파일</th>
          <td colspan="3">
            <div class="list-row">
                <div class="file-input">
                  <label>
                    <input type="file" name="files" onchange="selectFile(this);" />
                  </label>
                </div>
                <button type="button" onclick="removeFile(this);" class="btn" id="btn-delete"><span>삭제</span></button>
                <button type="button" onclick="addFile();" class="btn" id="btn-add"><span>파일 추가</span></button>
            </div>
          </td>
        </tr>
        <tr>
          <th>비밀번호</th>
          <td><input type="text" name="inqPwd"></td>
        </tr>
        </tbody>
      </table>
    </form>
  </div>

  <script th:inline="javascript">

  </script>
</div>
</body>
</html>
