<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org" xmlns:layout="www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}">
<!--security 적용 후 아래 코드로 변경해주세요-->
<!--<html xmlns:th="www.thymeleaf.org" xmlns:layout="www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}" xmlns:sec="www.thymeleaf.org/extras/spring-security">-->

<meta charset="UTF-8">
<title>GS Bank</title>
<link rel="stylesheet" href="/css/counsel/counsel.css">
<!-- 전체 적용될 CSS -->
<th:block layout:fragment="css"></th:block>
<!-- 전체 적용될 스크립트 -->
<th:block layout:fragment="script"></th:block>

<!-- 우리가 작업할 공간 -->
<body>
<div layout:fragment="content" class="content">
    <!-- 버튼 -->
    <button id="openModalBtn">상담 일지</button>

    <!-- 상담 목록 모달 창 -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <div class="d-flex justify-content-between">
                <h2>### 고객님 상담 목록</h2>
                <div>
                    <button id="counselWriteBtn" class="btn btn-dark">상담작성</button>
                    <span class="close" id="closeModalBtn" style="font-size: 40px; padding-right: 20px; padding-left: 70px;">&times;</span>
                </div>
            </div>
            <table class="table table-hover">
                <thead>
                <tr>
                    <th scope="col">번호</th>
                    <th scope="col">작성자</th>
                    <th scope="col">작성부서</th>
                    <th scope="col">상담유형</th>
                    <th scope="col">작성일</th>
                    <th scope="col">수정일</th>
                </tr>
                </thead>
                <tbody id="counselList">

                <!-- 반복적인 직원 정보 행들 추가 -->
                </tbody>
            </table>
            <nav aria-label="Page navigation">
                <ul id="pagination" class="pagination justify-content-center"></ul>
            </nav>
        </div>
    </div>

    <!-- 상담 상세 모달 창 -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <form>
                <div class="d-flex justify-content-between">
                    <h2>### 고객님 상담상세</h2>
                    <div>
                        <button type="button" id="counsel_update" class="btn btn-success">수정</button>
                        <button type="button" id="counsel_delete" class="btn btn-danger">삭제</button>
                        <span class="close" id="closeDetailModalBtn" style="font-size: 40px; padding-right: 20px; padding-left: 70px;">&times;</span>
                    </div>
                </div>

                <div class="form-group row" style="margin: 10px;">
                    <label class="col-sm-1 col-form-label">작성자</label>
                    <div class="col-sm-3">
                        <input type="text" id="user_id" readonly class="form-control-plaintext">
                    </div>

                    <label class="col-sm-1 col-form-label text-right">작성부서</label>
                    <div class="col-sm-3">
                        <input type="text" id="user_dept_cd" readonly class="form-control-plaintext">
                    </div>

                    <label class="col-sm-1 col-form-label text-right">작성일</label>
                    <div class="col-sm-3">
                        <input type="text" id="counsel_create_at" readonly class="form-control-plaintext">
                    </div>
                </div>

                <hr>

                <div class="form-group row" style="margin: 10px;">
                    <label class="col-sm-1 col-form-label text-right">상담유형</label>
                    <div class="col-sm-7">
                        <input type="text" id="counsel_category" readonly class="form-control-plaintext">
                    </div>

                    <label class="col-sm-1 col-form-label text-right">수정일</label>
                    <div class="col-sm-3">
                        <input type="text" id="counsel_update_at" readonly class="form-control-plaintext">
                    </div>
                </div>

                <hr>

                <div class="form-group row" style="margin: 10px;">
                    <label class="col-sm-1 col-form-label text-right">상담내용</label>
                    <div class="col-sm-10">
                        <textarea id="counsel_content" readonly class="form-control-plaintext" rows="10"></textarea>
                    </div>
                </div>
            </form>
            <button id="backBtn" class="btn btn-dark" style="width: 126px; margin-bottom: 20px; margin-left: 20px;">뒤로가기</button>
        </div>
    </div>

    <!-- 상담 작성 모달 창 -->
    <div id="writeModal" class="modal">
        <div class="modal-content">
            <form th:action="@{/customer/counsel/insertCounsel}" id="insertCounsel" method="post">

                <!-- 고객 아이디를 넣어주기 -->
                <input type="hidden" id="cust_id" name="cust_id">
                <!-- 직원 아이디를 넣어주기 -->
                <input type="hidden" id="writer_user_id" name="user_id">
                <!-- 상담 내용 상태 코드 = 상담완료 : 1, 상담대기 : 0 -->
                <input type="hidden" name="counsel_stcd" value="0">

                <div class="d-flex justify-content-between">
                    <h2>### 고객님 상담작성</h2>
                    <div>
                        <span class="close" id="closeWriteModalBtn" style="font-size: 40px; padding-right: 20px; padding-left: 70px;">&times;</span>
                    </div>
                </div>

                <div class="form-group row" style="margin: 10px;">
                    <label class="col-sm-1 col-form-label">작성자</label>
                    <div class="col-sm-5">
                        <input type="text" id="writer_user_name" readonly class="form-control-plaintext" name="user_name">
                    </div>

                    <label class="col-sm-1 col-form-label text-right">작성부서</label>
                    <div class="col-sm-3">
                        <input type="text" id="writer_user_dept_cd" readonly class="form-control-plaintext" name="user_dept_cd">
                    </div>
                </div>

                <hr>

                <div class="form-group row" style="margin: 10px;">
                    <label class="col-sm-1 col-form-label text-right">상담유형</label>
                    <div class="col-sm-3">
                        <select name="counsel_category" class="form-select me-2" style="width: 150px;">
                            <option selected>선택</option>
                            <option value="1">적금</option>
                            <option value="2">예금</option>
                            <option value="3">목돈적금</option>
                            <option value="4">대출</option>
                            <option value="5">기타</option>
                        </select>
                    </div>
                </div>

                <hr>

                <div class="form-group row" style="margin: 10px;">
                    <label class="col-sm-1 col-form-label text-right">상담내용</label>
                    <div class="col-sm-10">
                        <textarea class="form-control-plaintext" name="counsel_content" rows="10" style="border: 1px solid lightgray;border-radius: 10px;resize: none;"></textarea>
                    </div>
                </div>

                <div id="writeBtn" style="text-align: end;margin-right: 20px;">
                    <button class="btn btn-dark" style="width: 126px; margin-bottom: 20px;">작성</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/counsel/counsel.js"></script>
</div>
</body>
</html>
